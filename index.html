<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>INTEGRAL ACCESS – LEVEL OMEGA</title>
  <style>
    :root {
      --neon-green: #0f0;
      --dim-green: #005500;
      --dark-bg: #050505;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: var(--dark-bg);
      color: var(--neon-green);
      font-family: 'Courier New', Courier, monospace;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem;
      text-shadow: 0 0 5px var(--neon-green);
    }

    .container {
      max-width: 800px;
      width: 100%;
      border: 1px solid var(--neon-green);
      padding: 3rem;
      box-shadow: inset 0 0 20px rgba(0, 255, 0, 0.1), 0 0 20px rgba(0, 255, 0, 0.2);
      background: rgba(0, 10, 0, 0.8);
    }

    h1 {
      font-size: 1.8rem;
      text-align: center;
      margin-bottom: 2.5rem;
      letter-spacing: 2px;
      border-bottom: 1px dashed var(--neon-green);
      padding-bottom: 1rem;
    }

    .problem {
      font-size: 1.8rem;
      text-align: center;
      margin-bottom: 3rem;
      line-height: 1.5;
    }

    .hint-section {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.5rem;
      margin-bottom: 1rem;
      min-height: 80px;
    }

    button {
      background: transparent;
      color: var(--neon-green);
      border: 1px solid var(--neon-green);
      padding: 1rem 2rem;
      font-family: 'Courier New', Courier, monospace;
      font-size: 1.1rem;
      cursor: pointer;
      text-transform: uppercase;
      letter-spacing: 2px;
      transition: all 0.3s ease;
      text-shadow: 0 0 5px var(--neon-green);
      box-shadow: 0 0 10px rgba(0, 255, 0, 0.1);
    }

    button:hover:not(:disabled) {
      background: var(--neon-green);
      color: var(--dark-bg);
      box-shadow: 0 0 20px var(--neon-green);
    }

    button:disabled {
      color: var(--dim-green);
      border-color: var(--dim-green);
      text-shadow: none;
      box-shadow: none;
      cursor: not-allowed;
    }

    .hint-text {
      font-size: 1.2rem;
      color: #8f8;
      text-align: center;
      height: 2em; /* Prevents layout shifting */
    }

    .cursor {
      display: inline-block;
      width: 12px;
      height: 1.2em;
      background-color: var(--neon-green);
      vertical-align: middle;
      animation: blink 1s step-end infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0; }
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>INTEGRAL ACCESS – LEVEL OMEGA</h1>
    
    <div class="problem">
      Compute:<br>
      I = &int;<sub>1</sub><sup>e</sup> (ln x)<sup>2</sup> dx
    </div>

    <div class="hint-section">
      <button id="btn-hint">[ DECRYPT HINT ]</button>
      <div class="hint-text" id="text-hint"></div>
    </div>
  </div>

  <script>
    const hintText = "Use Integration by Parts twice. Let u = (ln x)² and dv = dx for the first pass.";

    const btnHint = document.getElementById('btn-hint');
    const textHintContainer = document.getElementById('text-hint');

    // Terminal typing effect function
    function typeEffect(element, text, speed) {
      element.innerHTML = '<span class="cursor"></span>';
      let i = 0;
      
      function type() {
        if (i < text.length) {
          element.innerHTML = '> ' + text.substring(0, i + 1) + '<span class="cursor"></span>';
          i++;
          setTimeout(type, speed);
        } else {
          element.innerHTML = '> ' + text; // Remove cursor when done
        }
      }
      type();
    }

    btnHint.addEventListener('click', () => {
      btnHint.disabled = true;
      typeEffect(textHintContainer, hintText, 40);
    });
  </script>

</body>
</html>
